# GSMamba ablation - window size K=5 (pa_frame=2; K = 2*pa_frame + 1).
# Same ablation-compute recipe as ablation_k3_reds.yml (6-frame clips, half LR, grad_clip_norm
# safeguard) with only pa_frame changed, so K=3 vs K=5 differ in nothing else.
# Single-GPU run (batch_size_per_gpu kept at 1, so global batch = 1) and cut to 100K iters --
# not enough time to run out to 300K. Meant to run alongside ablation_k3_reds.yml, one per GPU.
name: GSMamba_ablation_K5_REDS_300K_N6_1gpu

model_type: RecurrentMixPrecisionRTModel
scale: 4
num_gpu: 1
manual_seed: 0
find_unused_parameters: false
use_static_graph: true

datasets:
  train:
    name: REDS
    type: REDSRecurrentDataset
    dataroot_gt: /hdd/laniko/Dataset/REDS_dataset/REDS/train/train_sharp
    dataroot_lq: /hdd/laniko/Dataset/REDS_dataset/REDS/train/train_sharp_bicubic/X4
    meta_info_file: /hdd/laniko/ACCV2026/GSMamba/basicsr/data/meta_info_REDS_GT.txt
    val_partition: REDS4
    test_mode: False
    io_backend:
      type: disk

    num_frame: 6
    gt_size: 256
    interval_list: [1]
    random_reverse: false
    use_hflip: true
    use_rot: true

    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: REDS4
    type: VideoRecurrentTestDataset
    dataroot_gt: /hdd/laniko/Dataset/REDS_dataset/REDS4/GT
    dataroot_lq: /hdd/laniko/Dataset/REDS_dataset/REDS4/sharp_bicubic
    cache_data: true
    io_backend:
      type: disk
    num_frame: -1

network_g:
  type: GSMamba
  upscale: 4
  prop_depth: 4
  attn_depth: 4
  pa_frame: 2   # K = 2*2 + 1 = 5
  embed_dims: 192
  num_heads: 8
  use_checkpoint_attn: False
  spynet_path: /hdd/laniko/ACCV2026/GSMamba/pretrained/spynet_sintel.pth

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  ema_decay: 0.999
  grad_clip_norm: 1.0   # opt-in safeguard, see ablation_k3_reds.yml
  optim_g:
    type: Adam
    lr: !!float 1e-4    # matches ablation_k3_reds.yml for a fair K=3 vs K=5 comparison
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [300000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 300000
  warmup_iter: -1
  fix_flow: 5000
  flow_lr_mul: 0.125

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 5e10
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 10
  save_checkpoint_freq: !!float 1e3
  use_tb_logger: true
  wandb:
    project: gsmamba_reds_ablation_accv2026
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
